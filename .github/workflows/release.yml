name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows AMD64
            os: windows-latest
            platform: windows/amd64
            arch: amd64
          - name: Windows ARM64
            os: windows-latest
            platform: windows/arm64
            arch: arm64
          - name: macOS ARM64
            os: macos-latest
            platform: darwin/arm64
            arch: arm64
          - name: macOS AMD64
            os: macos-latest
            platform: darwin/amd64
            arch: amd64
          - name: Linux AMD64
            os: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64

    name: Build - ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      # Windows builds
      - name: Build Windows application
        if: runner.os == 'Windows'
        shell: bash
        run: |
          wails build -platform ${{ matrix.platform }} \
            -ldflags "-X sit/internal/version.Version=${{ steps.version.outputs.VERSION }} -X sit/internal/version.BuildDate=${{ steps.version.outputs.BUILD_DATE }}"
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # Linux builds (requires webkit2_41 tag for Ubuntu 24.04)
      - name: Build Linux application
        if: runner.os == 'Linux'
        run: |
          wails build -platform ${{ matrix.platform }} -tags webkit2_41 \
            -ldflags "-X sit/internal/version.Version=${{ steps.version.outputs.VERSION }} -X sit/internal/version.BuildDate=${{ steps.version.outputs.BUILD_DATE }}"
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # macOS builds
      - name: Build macOS application
        if: runner.os == 'macOS'
        run: |
          wails build -platform ${{ matrix.platform }} \
            -ldflags "-X sit/internal/version.Version=${{ steps.version.outputs.VERSION }} -X sit/internal/version.BuildDate=${{ steps.version.outputs.BUILD_DATE }}"
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # Rename artifacts per platform
      - name: Prepare Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item -Path "build/bin/sit.exe" -Destination "build/bin/sit-windows-${{ matrix.arch }}.exe"

      - name: Prepare macOS artifacts
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip -r sit-darwin-${{ matrix.arch }}.app.zip sit.app

      - name: Prepare Linux artifacts
        if: runner.os == 'Linux'
        run: |
          mv build/bin/sit "build/bin/sit-linux-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sit-${{ runner.os }}-${{ matrix.arch }}
          path: |
            build/bin/sit-*
            !build/bin/*.app

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -name 'sit-*' -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
